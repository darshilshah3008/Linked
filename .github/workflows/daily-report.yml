name: Daily Job Search Copilot Report

on:
  schedule:
    # 13:00 UTC daily. Edit to change the time. https://crontab.guru
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # needed to commit the updated tracker back to the repo

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "openai>=1.0" openpyxl

      - name: Seed database
        run: python -m src seed

      - name: Find leads (live via Serper Google Jobs)
        run: python -m src find-leads --limit 30

      - name: Find people
        run: python -m src find-people || true

      - name: Research companies
        run: python -m src research-companies || true

      - name: Generate daily plan + JSON export
        run: python -m src daily-plan --export dashboard.json

      - name: Generate Word report
        run: python generate_report_docx.py

      - name: Update application tracker (preserves Status from previous runs)
        run: python scripts/build_tracker.py dashboard.json

      - name: Build email body (excludes jobs marked Applied)
        run: python scripts/build_email_summary.py dashboard.json > email_body.txt

      - name: Set report date
        id: meta
        run: echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Commit tracker back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add application_tracker.csv application_tracker.xlsx
          if git diff --staged --quiet; then
            echo "No tracker changes to commit"
          else
            git commit -m "Daily tracker update ${{ steps.meta.outputs.date }}"
            git push
          fi

      - name: Email the report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Job Search Copilot <${{ secrets.MAIL_USERNAME }}>
          to: darshilshah3008@gmail.com
          subject: "Job Search Copilot - Daily Report ${{ steps.meta.outputs.date }}"
          body: file://email_body.txt
          attachments: application_tracker.xlsx,dashboard_report.docx,dashboard.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ steps.meta.outputs.date }}
          path: |
            application_tracker.xlsx
            application_tracker.csv
            dashboard.json
            dashboard_report.docx
            email_body.txt
            data/copilot.log
          if-no-files-found: warn
          retention-days: 14
